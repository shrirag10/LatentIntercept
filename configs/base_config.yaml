# ─── Simulation ─────────────────────────────────────────────────────────────
n_envs: 256          # Parallel Genesis environments; 256 safe for RTX 4060 8GB
sim_dt: 0.01         # Physics timestep (100 Hz)
control_freq: 10     # Agent acts every 10 sim steps → 10 Hz effective control
episode_len: 200     # Max steps per episode (20 s of real time)

# ─── Environment ─────────────────────────────────────────────────────────────
table:
  size: [1.5, 0.8, 0.02]     # [L, W, H] in metres
  friction: 0.01              # Genesis minimum (1e-2)

block:
  size: [0.06, 0.06, 0.06]   # Cube side length (6 cm)
  mass: 0.15                  # 150 g
  spawn_x_range: [0.4, 0.7]  # Distance along table from arm base
  speed_range: [1.5, 3.5]    # Launch speed in m/s
  angle_range: [-30, 30]      # Launch angle in degrees from table centreline

franka:
  home_q: [0, -0.785, 0, -2.356, 0, 1.571, 0.785]  # Home joint angles (rad)
  gripper_open: 0.04                                  # Open width in m
  contact_threshold: 5.0                              # Contact force (N) to detect catch
  position_delta_max: 0.1                             # Max joint displacement per step (rad, ~6°)

# ─── State & Reward ──────────────────────────────────────────────────────────
obs_dim: 24          # 7+7+1+3+3+3 = 24
action_dim: 8        # 7 joint position deltas + 1 gripper

reward:
  w_dist: 1.0        # Weight for distance component    R_dist = exp(-||p_ee - p_block||)
  w_vel: 0.5         # Weight for velocity-matching     R_vel  = exp(-||v_ee - v_block||)
  success_bonus: 10.0 # One-time terminal reward for successful catch
  dist_scale: 1.0    # Scale factor inside distance exponential

# ─── TD-MPC2 ─────────────────────────────────────────────────────────────────
tdmpc2:
  obs: state
  action_dim: 8
  horizon: 12            # Look-ahead steps (1.2 s at 10 Hz)
  num_samples: 512       # MPPI candidate trajectories
  num_elites: 64         # Top-k trajectories kept each iteration
  num_pi_trajs: 24       # Trajectories seeded by policy
  iterations: 6          # MPPI optimisation iterations per step

  # Network
  latent_dim: 512
  mlp_dim: 512
  enc_dim: 256

  # Training
  batch_size: 256        # Reduced from 512 for 8GB VRAM
  buffer_size: 1_000_000
  seed_steps: 5_000
  lr: 3.0e-4
  grad_clip_norm: 20.0

  # Exploration
  min_std: 0.05
  max_std: 2.0

# ─── Training Loop ────────────────────────────────────────────────────────────
training:
  total_steps: 10_000_000
  log_interval: 1_000
  eval_interval: 50_000
  eval_episodes: 20
  checkpoint_interval: 1_000_000

# ─── Paths ────────────────────────────────────────────────────────────────────
paths:
  checkpoints: trained_models/
  tensorboard: runs/
  outputs: outputs/
